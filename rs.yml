apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: dev-replicaset
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: quay.io/pandeysp/nginxdemo
          ports:
            - containerPort: 80
